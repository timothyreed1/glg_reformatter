<!DOCTYPE html>
<!--
  GLG Response Formatter
  Reformats raw GLG expert network profile exports into clean markdown.

  Setup:
  1. Create config.js in the same folder with your OpenAI key:
     const OPENAI_API_KEY = 'sk-yourKeyHere';
  2. Open this file in a browser. Note that Chrome may block local scripts.

  Do not commit config.js to version control since it contains your private key.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLG Response Formatter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #555; display: block; margin-bottom: 6px; }
  textarea { width: 100%; height: 420px; padding: 12px; font-size: 13px; font-family: 'Courier New', monospace; border: 1px solid #ddd; border-radius: 6px; resize: vertical; background: #fff; }
  textarea:focus { outline: none; border-color: #888; }
  .actions { display: flex; gap: 10px; margin: 14px 0; }
  button { padding: 9px 18px; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-copy { background: #e8e8e8; color: #333; }
  .btn-copy:hover { background: #d4d4d4; }
  .status { font-size: 12px; color: #666; padding: 6px 0; min-height: 20px; }
  .status.error { color: #c0392b; }
  .status.success { color: #27ae60; }
</style>
<script src="config.js"></script>
</head>
<body>
<div class="container">
  <h1>GLG Response Formatter</h1>
  <p class="sub">Paste raw GLG profile export on the left, get clean formatted markdown on the right.</p>
  <div class="actions">
    <button class="btn-primary" id="formatBtn">Format</button>
    <button class="btn-copy" id="copyBtn">Copy Output</button>
    <button class="btn-copy" id="clearBtn">Clear</button>
  </div>
  <div class="status" id="status"></div>
  <div class="cols">
    <div>
      <label>Raw GLG Text</label>
      <textarea id="input" placeholder="Paste your raw GLG profile question text here..."></textarea>
    </div>
    <div>
      <label>Formatted Output</label>
      <textarea id="output" placeholder="Formatted output will appear here..."></textarea>
    </div>
  </div>
</div>

<script>

const SYSTEM_PROMPT = `You are a formatter for GLG expert network profile responses.

Your job is to reformat raw copy-pasted GLG profile question exports into clean, readable markdown. 

Rules:
- Each question becomes a numbered list item with the question text in bold, followed by its answer content indented below
- If the answer contains a vendor/option list (vendor name followed by experience level on next line), format it as a markdown table with columns: Vendor | Experience Level
- Sort vendor tables with most hands-on experience first (Current Customer > Past Customer > Evaluated > Familiar)
- Comments become a bullet list unless they are a single short sentence, in which case leave as prose
- Strip dates
- Strip the word "Answer" and "Comment" as standalone labels — fold them into the structure
- Do not add any preamble or explanation, output only the formatted markdown
- Preserve the substance of the text exactly — do not paraphrase, embellish, or summarize
- Do not try to answer questions posed in the content - your job is to only format the content`;

document.getElementById('formatBtn').addEventListener('click', async () => {
  const input = document.getElementById('input').value.trim();
  if (!input) { setStatus('Paste some text first.', 'error'); return; }
  if (!OPENAI_API_KEY || OPENAI_API_KEY === 'sk-yourKeyHere') {
    setStatus('Add your OpenAI API key to the file first.', 'error'); return;
  }

  const btn = document.getElementById('formatBtn');
  btn.disabled = true;
  btn.textContent = 'Formatting...';
  setStatus('Calling OpenAI...');

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 4000,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: input }
        ]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.choices[0].message.content;
    document.getElementById('output').value = text;
    setStatus('Done.', 'success');
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Format';
  }
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const el = document.getElementById('output');
  if (!el.value) { setStatus('Nothing to copy.', 'error'); return; }
  el.select();
  document.execCommand('copy');
  setStatus('Copied to clipboard.', 'success');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  setStatus('');
});

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
